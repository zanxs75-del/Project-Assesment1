<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <main class="container">
    <h1>My Tasks</h1>
    <ul class="list-group" id="taskList">

    </ul>

    <h1>Add New Task</h1>
    <div>
      <div class="m-2">
        <label>Task Name</label>
        <input type="text" id="name" class="form-control" />
      </div>
      <div class="m-2">
        <label>Date Due</label>
        <input type="date" id="dueDate" class="form-control" />
      </div>
      <div class="m-2">
        <label>Urgency</label>
        <select id="urgency" class="form-control">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

      </div>
      <button class="btn btn-primary m-2" id="addTodo">Create</button>
    </div>

  </main>

  <!-- SweetAlert -->
   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- axios -->
   <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>

  <!-- all global variables and functions are shared across javascript files -->
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>

</html>
